<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track the Labs | Mobile Excellence</title>
    <style>
        :root {
            --primary: #2563eb;
            --text-main: #111827;
            --text-sub: #6b7280;
            --bg: #ffffff;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            opacity: 0.2;
            z-index: -1;
        }
        header {
            padding: 12vh 2rem 1vh;
            text-align: center;
        }
        .brand-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 100px;
            background: white;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: var(--text-sub);
        }
        .hero-text {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .stats-box {
            margin: 5vh 0;
            text-align: center;
        }
        .counter-value {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            display: block;
        }
        .stats-label {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-sub);
            letter-spacing: 0.05rem;
        }

        main {
            flex: 1;
            max-width: 650px;
            margin: 0 auto;
            padding: 0 2rem 6vh;
            text-align: center;
        }
        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin-bottom: 4vh;
        }
        
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        
        .play-store-link {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .play-store-link:hover {
            transform: scale(1.05);
        }
        .play-store-img {
            width: 200px;
            height: auto;
            display: block;
        }
        
        .mail-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .mail-link:hover { opacity: 1; }

        footer {
            padding: 4vh 2rem;
            font-size: 0.8rem;
            color: var(--text-sub);
            border-top: 1px solid #f3f4f6;
        }
        .footer-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-container a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .footer-container { flex-direction: column; gap: 1.5rem; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand-badge">
        <span class="brand-name">Track the Labs</span>
    </div>
    <h1 class="hero-text">Engineering Digital<br>Experiences.</h1>
</header>

<main>
    <div class="stats-box">
        <span class="counter-value" id="download-counter">0</span>
        <span class="stats-label">Users Worldwide</span>
    </div>

    <p class="description">
        Specializing in high-performance Android solutions, focusing on scalable architectures and fluid user interfaces.
    </p>

    <div class="action-area">
        <!-- ERSETZE DEINE_APP_ID DURCH DEINE ECHTE ID -->
        <a href="https://play.google.com/store/apps/details?id=com.trackinglabs.parceltracker" target="_blank" class="play-store-link">
            <img class="play-store-img" 
                 src="https://wikimedia.org" 
                 alt="Get it on Google Play">
        </a>
        <a href="mailto:info@deinedomain.com" class="mail-link">Inquiries: info@deinedomain.com</a>
    </div>
</main>

<footer>
    <div class="footer-container">
        <div>&copy; 2026 Track the Labs</div>
        <div>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>
</footer>

<script>
    function animateCounter(id, start, end, duration) {
        let obj = document.getElementById(id);
        let range = end - start;
        let startTime = new Date().getTime();
        let endTime = startTime + duration;

        function run() {
            let now = new Date().getTime();
            let remaining = Math.max((endTime - now) / duration, 0);
            let value = Math.round(end - (remaining * range));
            obj.innerHTML = value.toLocaleString('de-DE') + "+";
            if (value == end) return;
            requestAnimationFrame(run);
        }
        requestAnimationFrame(run);
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Zählt von 0 auf 3.000.000 in 2,5 Sekunden
        animateCounter("download-counter", 0, 3000000, 2500);
    });
</script>

</body>
</html>
